server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback (single page — no client routing, but deep refresh safe).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API proxy: the UI always calls relative /api/*; strip the prefix and
    # forward to the FastAPI service on the compose network.
    location /api/ {
        proxy_pass http://api:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        # SSE: never buffer the event stream, allow long-lived responses.
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_set_header Connection "";
    }
}
